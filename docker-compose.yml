# PI Retail demo: landing (SSR) behind Caddy (TLS) on a single small VPS.
name: pi-retail

services:
  landing:
    build: .
    environment:
      # Contact-form Telegram notify is skipped while these are unset (blank = off).
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - landing
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
