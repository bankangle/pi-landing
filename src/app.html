<!doctype html>
<html lang="%lang%" class="scroll-smooth">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="theme-color" content="#0b1120" />
		<script>
			// Pre-paint: hide the native scrollbar ONLY where Lenis will take over
			// (mirrors smooth-scroll.js conditions) — kills the load-time flash.
			try {
				if (!matchMedia('(pointer: coarse)').matches && !matchMedia('(prefers-reduced-motion: reduce)').matches) {
					document.documentElement.classList.add('no-scrollbar');
				}
			} catch (e) {}
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover" class="bg-ink text-slate-100 antialiased">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
